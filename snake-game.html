<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="snake.png">
    <title>Simple Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #4ecca3, 0 0 20px #4ecca3;
            color: #4ecca3;
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #4ecca3;
        }

        h3 {
            font-size: 1.4rem;
            margin-bottom: 10px;
            color: #4ecca3;
            text-shadow: 0 0 5px rgba(78, 204, 163, 0.5);
        }

        .game-container {
            position: relative;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(78, 204, 163, 0.3);
        }

        #gameCanvas {
            border: 3px solid #4ecca3;
            border-radius: 10px;
            background-color: #0a0a15;
            display: block;
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .score, .high-score {
            padding: 8px 15px;
            background: rgba(78, 204, 163, 0.2);
            border-radius: 8px;
            border: 1px solid #4ecca3;
        }

        .controls-info {
            margin-top: 20px;
            text-align: center;
            color: #888;
            font-size: 0.9rem;
        }

        .controls-info span {
            display: inline-block;
            margin: 5px;
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            border: 1px solid #555;
        }

        .start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            z-index: 10;
        }

        .start-overlay h2 {
            font-size: 2rem;
            color: #4ecca3;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #4ecca3;
        }

        .start-overlay p {
            font-size: 1rem;
            color: #ccc;
            margin-bottom: 10px;
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
        }

        .game-over-overlay.show {
            display: flex;
        }

        .game-over-overlay h2 {
            font-size: 2rem;
            color: #ff6b6b;
            margin-bottom: 15px;
            text-shadow: 0 0 10px #ff6b6b;
        }

        .game-over-overlay p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1.1rem;
            background: #4ecca3;
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #3db892;
            transform: scale(1.05);
            box-shadow: 0 0 15px #4ecca3;
        }

        .size-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .size-btn {
            padding: 8px 16px;
            font-size: 0.85rem;
            background: rgba(78, 204, 163, 0.2);
            color: #4ecca3;
            border: 1px solid #4ecca3;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .size-btn:hover {
            background: rgba(78, 204, 163, 0.4);
        }

        .size-btn.active {
            background: #4ecca3;
            color: #1a1a2e;
            font-weight: bold;
        }

        .size-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .back-link {
            margin-top: 20px;
            color: #4ecca3;
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #3db892;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>🐍 Simple Snake Game</h1>
    <h3>Window Size</h3>
    <div class="size-selector">
        <button class="size-btn active" data-size="small">Small</button>
        <button class="size-btn" data-size="large">Large</button>
    </div>

    <div class="game-container">
        <div class="score-board">
            <div class="score">Score: <span id="scoreValue">0</span></div>
            <div class="high-score">High Score: <span id="highScoreValue">0</span></div>
        </div>

        <canvas id="gameCanvas" width="300" height="300"></canvas>

        <div class="start-overlay" id="startOverlay">
            <h2>🐍 Snake Game</h2>
            <p>Use arrow keys to control the snake</p>
            <p>Eat the red food to grow and score points</p>
            <button class="btn" onclick="startGame()">Start Game</button>
        </div>

        <div class="game-over-overlay" id="gameOverOverlay">
            <h2>Game Over!</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button class="btn" onclick="resetGame()">Play Again</button>
        </div>
    </div>

    <div class="controls-info">
        <p>Use <span>↑</span> <span>↓</span> <span>←</span> <span>→</span> arrow keys to move</p>
        <p>Press <span>Space</span> to pause</p>
    </div>

    <a href="index.html" class="back-link">← Back to Home</a>

    <script>
        // Game constants
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        let tileCount = canvas.width / gridSize;

        // Map sizes
        const mapSizes = {
            small: 300,
            large: 500
        };

        // Game state
        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameSpeed = 100; // milliseconds between moves
        let lastMoveTime = 0;
        let animationId = null;
        let isPaused = false;
        let isGameOver = false;

        // DOM elements
        const scoreValue = document.getElementById('scoreValue');
        const highScoreValue = document.getElementById('highScoreValue');
        const finalScore = document.getElementById('finalScore');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const startOverlay = document.getElementById('startOverlay');

        // Game has not started yet
        let gameStarted = false;

        // Initialize high score display
        highScoreValue.textContent = highScore;

        // Initialize game (sets up snake and food, but doesn't start the loop)
        function initGame() {
            // Start with snake in the middle
            snake = [
                { x: Math.floor(tileCount / 2), y: Math.floor(tileCount / 2) },
                { x: Math.floor(tileCount / 2) - 1, y: Math.floor(tileCount / 2) },
                { x: Math.floor(tileCount / 2) - 2, y: Math.floor(tileCount / 2) }
            ];

            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameSpeed = 100;
            isPaused = false;
            isGameOver = false;

            scoreValue.textContent = score;
            gameOverOverlay.classList.remove('show');

            placeFood();
            draw();
        }

        // Start the game (called from start button)
        function startGame() {
            gameStarted = true;
            startOverlay.style.display = 'none';
            lastMoveTime = performance.now();
            
            // Disable size buttons during gameplay
            sizeButtons.forEach(btn => btn.disabled = true);
            
            if (animationId) cancelAnimationFrame(animationId);
            gameLoop();
        }

        // Smooth game loop using requestAnimationFrame
        function gameLoop(currentTime) {
            animationId = requestAnimationFrame(gameLoop);

            if (isPaused || isGameOver) return;

            const deltaTime = currentTime - lastMoveTime;

            if (deltaTime >= gameSpeed) {
                lastMoveTime = currentTime;
                update();
            }
        }

        // Place food at random position
        function placeFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        // Update game state (called by game loop)
        function update() {
            // Update direction
            direction = { ...nextDirection };

            // Calculate new head position
            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // Check wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // Check self collision
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            // Add new head
            snake.unshift(head);

            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreValue.textContent = score;

                // Update high score
                if (score > highScore) {
                    highScore = score;
                    highScoreValue.textContent = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }

                // Increase speed slightly
                if (gameSpeed > 50) {
                    gameSpeed -= 2;
                }

                placeFood();
            } else {
                // Remove tail if no food eaten
                snake.pop();
            }

            draw();
        }

        // Draw everything
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0a0a15';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid (subtle)
            ctx.strokeStyle = 'rgba(78, 204, 163, 0.1)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // Draw food
            ctx.fillStyle = '#ff6b6b';
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;

            // Draw snake
            snake.forEach((segment, index) => {
                // Gradient color from head to tail
                const greenValue = Math.max(100, 204 - index * 10);
                ctx.fillStyle = index === 0 ? '#4ecca3' : `rgb(78, ${greenValue}, 130)`;

                if (index === 0) {
                    ctx.shadowColor = '#4ecca3';
                    ctx.shadowBlur = 10;
                } else {
                    ctx.shadowBlur = 0;
                }

                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );

                // Draw eyes on head
                if (index === 0) {
                    ctx.fillStyle = '#0a0a15';
                    ctx.shadowBlur = 0;

                    let eyeOffsetX1, eyeOffsetX2, eyeOffsetY1, eyeOffsetY2;

                    if (direction.x === 1) { // Right
                        eyeOffsetX1 = 12; eyeOffsetY1 = 5;
                        eyeOffsetX2 = 12; eyeOffsetY2 = 13;
                    } else if (direction.x === -1) { // Left
                        eyeOffsetX1 = 6; eyeOffsetY1 = 5;
                        eyeOffsetX2 = 6; eyeOffsetY2 = 13;
                    } else if (direction.y === -1) { // Up
                        eyeOffsetX1 = 5; eyeOffsetY1 = 6;
                        eyeOffsetX2 = 13; eyeOffsetY2 = 6;
                    } else { // Down
                        eyeOffsetX1 = 5; eyeOffsetY1 = 12;
                        eyeOffsetX2 = 13; eyeOffsetY2 = 12;
                    }

                    ctx.beginPath();
                    ctx.arc(
                        segment.x * gridSize + eyeOffsetX1,
                        segment.y * gridSize + eyeOffsetY1,
                        2, 0, Math.PI * 2
                    );
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(
                        segment.x * gridSize + eyeOffsetX2,
                        segment.y * gridSize + eyeOffsetY2,
                        2, 0, Math.PI * 2
                    );
                    ctx.fill();
                }
            });

            ctx.shadowBlur = 0;

            // Draw pause indicator
            if (isPaused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#4ecca3';
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
            }
        }

        // Game over
        function gameOver() {
            isGameOver = true;
            if (animationId) cancelAnimationFrame(animationId);
            finalScore.textContent = score;
            gameOverOverlay.classList.add('show');
            // Re-enable size buttons after game over
            sizeButtons.forEach(btn => btn.disabled = false);
        }

        // Reset game (after game over)
        function resetGame() {
            initGame();
            startGame();
        }

        // Handle keyboard input
        document.addEventListener('keydown', (e) => {
            // Handle Enter key for starting/restarting game
            if (e.key === 'Enter') {
                // Only start game if it hasn't started yet and start overlay is visible
                if (!gameStarted && startOverlay.style.display !== 'none') {
                    startGame();
                    e.preventDefault();
                    return;
                }
                // Only reset game if game is over and overlay is visible
                if (isGameOver && gameOverOverlay.classList.contains('show')) {
                    resetGame();
                    e.preventDefault();
                    return;
                }
            }

            switch (e.key) {
                case 'ArrowUp':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    e.preventDefault();
                    break;
                case ' ':
                    if (!isGameOver) {
                        isPaused = !isPaused;
                        draw();
                    }
                    e.preventDefault();
                    break;
            }
        });

        // Handle map size selection
        const sizeButtons = document.querySelectorAll('.size-btn');
        sizeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const size = btn.getAttribute('data-size');
                changeMapSize(size);
            });
        });

        function changeMapSize(size) {
            // Update active button
            sizeButtons.forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-size="${size}"]`).classList.add('active');

            // Set new canvas size
            const canvasSize = mapSizes[size];
            canvas.width = canvasSize;
            canvas.height = canvasSize;
            tileCount = canvasSize / gridSize;

            // If game hasn't started yet, just redraw
            if (!gameStarted) {
                initGame();
                return;
            }

            // If game is over, reinitialize but keep game over state
            if (isGameOver) {
                // Manually set up snake and food without resetting isGameOver
                snake = [
                    { x: Math.floor(tileCount / 2), y: Math.floor(tileCount / 2) },
                    { x: Math.floor(tileCount / 2) - 1, y: Math.floor(tileCount / 2) },
                    { x: Math.floor(tileCount / 2) - 2, y: Math.floor(tileCount / 2) }
                ];
                direction = { x: 1, y: 0 };
                nextDirection = { x: 1, y: 0 };
                score = 0;
                scoreValue.textContent = score;
                placeFood();
                draw();
                // Keep isGameOver = true and overlay visible
                return;
            }

            // During active gameplay, just redraw at new size without restarting
            // The snake and food positions will be scaled to fit the new grid
            draw();
        }

        // Initialize game (show start screen)
        initGame();
    </script>
</body>
</html>
